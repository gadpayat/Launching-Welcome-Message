<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome Banner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    width:100vw;
    height:100vh;
}

/* ==========================
   FIREWORKS CANVAS
========================== */

#fireworksCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
    background:transparent;
}

/* ==========================
   BANNER
========================== */

.banner{
    position:relative;
    width:100%;
    height:180px;
    overflow:hidden;
    display:flex;
    align-items:center;
    background:url("assets/gold-glitter.jpg") center center;
    background-size:cover;
    border-bottom:4px solid rgba(255,255,255,0.3);
    z-index:5;
}

/* dark overlay for text visibility */
.banner::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        rgba(255,215,0,0.08),
        rgba(255,215,0,0.08)
    );
}

/* ==========================
   GLITTER SPARKLES
========================== */

.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    filter:blur(1px);
    animation:sparkle 2s infinite;
}

@keyframes sparkle{
    0%{
        opacity:0;
        transform:scale(0);
    }
    50%{
        opacity:1;
        transform:scale(3);
    }
    100%{
        opacity:0;
        transform:scale(0);
    }
}

/* ==========================
   MOVING TEXT
========================== */

.marquee{
    position:absolute;
    white-space:nowrap;
    width:100%;
    z-index:10;
}

.marquee h1{
    display:inline-block;
    font-size:72px;
    font-weight:900;
    color:black;
    text-shadow:
        2px 2px 0 rgba(255,255,255,.8),
        0 0 15px rgba(255,255,255,.7);

    animation: moveText 12s linear infinite;
}

@keyframes moveText{
    from{
        transform:translateX(100vw);
    }
    to{
        transform:translateX(-120%);
    }
}

/* ==========================
   RESPONSIVE
========================== */

@media(max-width:768px){

    .banner{
        height:130px;
    }

    .marquee h1{
        font-size:42px;
    }

}

</style>
</head>

<body>

<canvas id="fireworksCanvas"></canvas>

<div class="banner">

    <div class="marquee">
        <h1>Welcome to my page.</h1>
    </div>

</div>

<script>

/* =====================================
   GLITTER SPARKLE EFFECT
===================================== */

const banner = document.querySelector(".banner");

function createSparkle(){

    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");

    sparkle.style.left = Math.random()*100 + "%";
    sparkle.style.top = Math.random()*100 + "%";

    sparkle.style.animationDuration =
        (Math.random()*2 + 1) + "s";

    banner.appendChild(sparkle);

    setTimeout(()=>{
        sparkle.remove();
    },3000);
}

setInterval(createSparkle,100);


/* =====================================
   REAL FIREWORKS
===================================== */

const canvas = document.getElementById("fireworksCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

const particles = [];

class Particle{

    constructor(x,y,color){

        this.x = x;
        this.y = y;
        this.color = color;

        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*8 + 2;

        this.vx = Math.cos(angle)*speed;
        this.vy = Math.sin(angle)*speed;

        this.alpha = 1;
        this.size = Math.random()*3 + 1;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.vy += 0.05;

        this.alpha -= 0.01;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.alpha;

        ctx.beginPath();
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.restore();
    }
}

function launchFirework(){

    const x = Math.random()*canvas.width;
    const y = Math.random()*canvas.height*0.5;

    const colors = [
        "#FFD700",
        "#FFFFFF",
        "#FFB000",
        "#FFF5B7"
    ];

    const color =
        colors[Math.floor(Math.random()*colors.length)];

    for(let i=0;i<120;i++){

        particles.push(
            new Particle(x,y,color)
        );

    }
}

setInterval(launchFirework,1200);

function animate(){

    requestAnimationFrame(animate);

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=particles.length-1;i>=0;i--){

        particles[i].update();
        particles[i].draw();

        if(particles[i].alpha<=0){

            particles.splice(i,1);

        }
    }
}

animate();

</script>

</body>
</html>
